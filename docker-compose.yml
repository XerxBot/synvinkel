services:
  db:
    image: pgvector/pgvector:pg16
    container_name: synvinkel-db
    environment:
      POSTGRES_USER: synvinkel
      POSTGRES_PASSWORD: synvinkel_dev
      POSTGRES_DB: synvinkel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synvinkel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synvinkel-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synvinkel-api
    environment:
      DATABASE_URL: postgresql+asyncpg://synvinkel:synvinkel_dev@db:5432/synvinkel
      DATABASE_URL_SYNC: postgresql://synvinkel:synvinkel_dev@db:5432/synvinkel
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      ADMIN_EMAIL: xerxes@analytech.se
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synvinkel-frontend
    environment:
      API_URL: http://backend:8000/api/v1
      PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "4321:4321"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
